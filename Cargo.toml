[package]
name = "dilithium-poc"
version = "0.1.0"
edition = "2024"

[features]
default = ["std"]
std = []
pkix = []
experimental-params = []
instrumentation = []

[dependencies]
rand_core = { version = "0.10.1", features = ["getrandom"] }
sha3 = "0.10"

[dev-dependencies]
criterion = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bench]]
name = "sampling"
harness = false

[[bench]]
name = "signing_repetitions"
harness = false
required-features = ["instrumentation"]
